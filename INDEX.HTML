<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links Shopee - Revenda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 { font-size: 2.5rem; color: #ee4d2d; margin-bottom: 0.5rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .product-card { background: white; border-radius: 1rem; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 1.5rem; }
        .current-price { font-size: 1.8rem; color: #ee4d2d; font-weight: bold; }
        .old-price { text-decoration: line-through; color: #999; margin-left: 0.5rem; }
        .shopee-btn { background: #ee4d2d; color: white; border: none; padding: 0.8rem; border-radius: 2rem; width: 100%; font-weight: bold; cursor: pointer; }
        .footer { text-align: center; margin-top: 3rem; padding: 2rem; color: #666; cursor: pointer; }
        
        /* Admin - escondido por padrão */
        .admin-float { position: fixed; bottom: 20px; right: 20px; background: #ee4d2d; color: white; width: 50px; height: 50px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 100; font-size: 1.5rem; }
        .admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 2rem; border-radius: 1rem; z-index: 200; width: 90%; max-width: 500px; }
        .admin-panel.active { display: block; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; }
        .overlay.active { display: block; }
        input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 0.5rem; }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ Meus Links Shopee</h1>
            <p>Produtos selecionados para revenda</p>
        </div>
        <div id="productsContainer" class="products-grid">📦 Carregando...</div>
        <div class="footer">
            <p>🔗 Links oficiais da Shopee | Revenda autorizada</p>
        </div>
    </div>

    <!-- Botão admin (escondido dos clientes) -->
    <div id="adminBtn" class="admin-float" onclick="abrirAdmin()">🔧</div>
    <div id="overlay" class="overlay"></div>
    
    <div id="adminPanel" class="admin-panel">
        <h3 style="color:#ee4d2d;">🔐 Admin</h3>
        <div id="loginDiv">
            <input type="password" id="senha" placeholder="Senha">
            <button onclick="login()" style="background:#ee4d2d; color:white; border:none; padding:0.5rem; width:100%;">Entrar</button>
            <p style="font-size:0.7rem; margin-top:0.5rem;">Senha: admin123</p>
        </div>
        <div id="adminDiv" style="display:none;">
            <div id="listaProdutos"></div>
            <button onclick="novoProduto()" style="background:#10b981; color:white; border:none; padding:0.5rem; width:100%; margin:0.5rem 0;">➕ Adicionar</button>
            <button onclick="fecharAdmin()" style="background:#64748b; color:white; border:none; padding:0.5rem; width:100%;">Fechar</button>
        </div>
    </div>

    <script>
        let produtos = [
            { id: 1, nome: "Fone Bluetooth", precoPromocional: 79.90, precoOriginal: 149.90, imagem: "https://via.placeholder.com/300x250/ee4d2d/white?text=Fone", linkShopee: "#", parcelamento: "4x de R$19,98" },
            { id: 2, nome: "Smartwatch", precoPromocional: 129.90, precoOriginal: 299.90, imagem: "https://via.placeholder.com/300x250/ee4d2d/white?text=Watch", linkShopee: "#", parcelamento: "6x de R$21,65" }
        ];
        
        let logado = false;
        
        function salvar() { localStorage.setItem('produtos', JSON.stringify(produtos)); renderizar(); }
        function carregar() { const p = localStorage.getItem('produtos'); if(p) produtos = JSON.parse(p); renderizar(); }
        
        function renderizar() {
            const container = document.getElementById('productsContainer');
            if(!produtos.length) { container.innerHTML = '<div style="text-align:center;padding:3rem;">Nenhum produto</div>'; return; }
            container.innerHTML = produtos.map(p => `
                <div class="product-card">
                    <img class="card-img" src="${p.imagem}" onerror="this.src='https://via.placeholder.com/300x250/ee4d2d/white?text=Produto'">
                    <div class="card-content">
                        <h3>${p.nome}</h3>
                        <span class="current-price">R$ ${p.precoPromocional.toFixed(2)}</span>
                        <span class="old-price">R$ ${p.precoOriginal.toFixed(2)}</span>
                        <div style="margin:10px 0;">${p.parcelamento}</div>
                        <button class="shopee-btn" onclick="window.open('${p.linkShopee}','_blank')">Comprar</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Admin (aparece SÓ PARA VOCÊ)
        let cliqueRodape = 0;
        document.querySelector('.footer').addEventListener('click', () => {
            cliqueRodape++;
            if(cliqueRodape === 5) {
                document.getElementById('adminBtn').style.display = 'flex';
                alert('🔧 Modo admin liberado! Clique no botão laranja.');
                cliqueRodape = 0;
            }
            setTimeout(() => cliqueRodape = 0, 3000);
        });
        
        function abrirAdmin() { document.getElementById('overlay').classList.add('active'); document.getElementById('adminPanel').classList.add('active'); }
        function fecharAdmin() { document.getElementById('overlay').classList.remove('active'); document.getElementById('adminPanel').classList.remove('active'); }
        
        function login() {
            if(document.getElementById('senha').value === 'admin123') {
                logado = true;
                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('adminDiv').style.display = 'block';
                atualizarLista();
            } else alert('Senha errada');
        }
        
        function atualizarLista() {
            const lista = document.getElementById('listaProdutos');
            lista.innerHTML = produtos.map(p => `
                <div style="border:1px solid #ddd; margin:0.5rem 0; padding:0.5rem; border-radius:0.5rem;">
                    <strong>${p.nome}</strong> - R$ ${p.precoPromocional}
                    <div style="margin-top:0.5rem;">
                        <button onclick="editar(${p.id})" style="background:#3b82f6; color:white; border:none; padding:0.2rem 0.5rem;">✏️</button>
                        <button onclick="excluir(${p.id})" style="background:#ef4444; color:white; border:none; padding:0.2rem 0.5rem;">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        function novoProduto() {
            const nome = prompt('Nome:');
            const precoPromo = parseFloat(prompt('Preço promocional:'));
            const precoOrig = parseFloat(prompt('Preço original:'));
            const link = prompt('Link Shopee:');
            const imagem = prompt('URL da imagem (ou Enter para padrão):') || 'https://via.placeholder.com/300x250/ee4d2d/white?text=Produto';
            if(nome && precoPromo && precoOrig && link) {
                produtos.push({ id: Date.now(), nome, precoPromocional: precoPromo, precoOriginal: precoOrig, imagem, linkShopee: link, parcelamento: 'Até 3x' });
                salvar();
                atualizarLista();
            }
        }
        
        function editar(id) {
            const p = produtos.find(x => x.id === id);
            if(!p) return;
            const nome = prompt('Novo nome:', p.nome);
            if(nome) p.nome = nome;
            const preco = parseFloat(prompt('Novo preço promo:', p.precoPromocional));
            if(preco) p.precoPromocional = preco;
            const link = prompt('Novo link:', p.linkShopee);
            if(link) p.linkShopee = link;
            salvar();
            atualizarLista();
        }
        
        function excluir(id) { if(confirm('Excluir?')) { produtos = produtos.filter(x => x.id !== id); salvar(); atualizarLista(); } }
        
        carregar();
    </script>
</body>
</html>
